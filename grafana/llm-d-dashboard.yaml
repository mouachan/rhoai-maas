apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: llm-d-dashboard
  namespace: user-grafana
  labels:
    app: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Latency",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 1 },
          "id": 1,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by(le) (rate(kserve_vllm:time_to_first_token_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "p99"
            },
            {
              "expr": "histogram_quantile(0.95, sum by(le) (rate(kserve_vllm:time_to_first_token_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.50, sum by(le) (rate(kserve_vllm:time_to_first_token_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "p50"
            },
            {
              "expr": "rate(kserve_vllm:time_to_first_token_seconds_sum{model_name=~\"$model_name\"}[$__rate_interval]) / rate(kserve_vllm:time_to_first_token_seconds_count{model_name=~\"$model_name\"}[$__rate_interval])",
              "legendFormat": "avg"
            }
          ],
          "title": "Time to First Token (TTFT)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 1 },
          "id": 2,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by(le) (rate(kserve_vllm:request_time_per_output_token_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "p99"
            },
            {
              "expr": "histogram_quantile(0.95, sum by(le) (rate(kserve_vllm:request_time_per_output_token_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.50, sum by(le) (rate(kserve_vllm:request_time_per_output_token_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "p50"
            },
            {
              "expr": "rate(kserve_vllm:request_time_per_output_token_seconds_sum{model_name=~\"$model_name\"}[$__rate_interval]) / rate(kserve_vllm:request_time_per_output_token_seconds_count{model_name=~\"$model_name\"}[$__rate_interval])",
              "legendFormat": "avg"
            }
          ],
          "title": "Time Per Output Token (TPOT)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 1 },
          "id": 3,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by(le) (rate(kserve_vllm:e2e_request_latency_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "p99"
            },
            {
              "expr": "histogram_quantile(0.95, sum by(le) (rate(kserve_vllm:e2e_request_latency_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.50, sum by(le) (rate(kserve_vllm:e2e_request_latency_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "p50"
            },
            {
              "expr": "rate(kserve_vllm:e2e_request_latency_seconds_sum{model_name=~\"$model_name\"}[$__rate_interval]) / rate(kserve_vllm:e2e_request_latency_seconds_count{model_name=~\"$model_name\"}[$__rate_interval])",
              "legendFormat": "avg"
            }
          ],
          "title": "E2E Request Latency",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 9 },
          "id": 4,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by(le) (rate(kserve_vllm:inter_token_latency_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "p99"
            },
            {
              "expr": "histogram_quantile(0.95, sum by(le) (rate(kserve_vllm:inter_token_latency_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.50, sum by(le) (rate(kserve_vllm:inter_token_latency_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "p50"
            }
          ],
          "title": "Inter-Token Latency (ITL)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 9 },
          "id": 5,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by(le) (rate(kserve_vllm:request_prefill_time_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "Prefill p95"
            },
            {
              "expr": "histogram_quantile(0.95, sum by(le) (rate(kserve_vllm:request_decode_time_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "Decode p95"
            },
            {
              "expr": "histogram_quantile(0.95, sum by(le) (rate(kserve_vllm:request_queue_time_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "Queue p95"
            }
          ],
          "title": "Prefill / Decode / Queue Time (p95)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 9 },
          "id": 6,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by(le) (rate(kserve_vllm:request_inference_time_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.50, sum by(le) (rate(kserve_vllm:request_inference_time_seconds_bucket{model_name=~\"$model_name\"}[$__rate_interval])))",
              "legendFormat": "p50"
            }
          ],
          "title": "Inference Time",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 17 },
          "id": 101,
          "title": "Throughput & Requests",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "cps"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 18 },
          "id": 7,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "rate(kserve_vllm:generation_tokens_total{model_name=~\"$model_name\"}[$__rate_interval])",
              "legendFormat": "Generation tokens/s"
            },
            {
              "expr": "rate(kserve_vllm:prompt_tokens_total{model_name=~\"$model_name\"}[$__rate_interval])",
              "legendFormat": "Prompt tokens/s"
            }
          ],
          "title": "Token Throughput",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 18 },
          "id": 8,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "kserve_vllm:num_requests_running{model_name=~\"$model_name\"}",
              "legendFormat": "Running"
            },
            {
              "expr": "kserve_vllm:num_requests_waiting{model_name=~\"$model_name\"}",
              "legendFormat": "Waiting"
            }
          ],
          "title": "Scheduler State",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 18 },
          "id": 9,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum by(finished_reason) (rate(kserve_vllm:request_success_total{model_name=~\"$model_name\"}[$__rate_interval]))",
              "legendFormat": "{{finished_reason}}"
            }
          ],
          "title": "Request Rate by Finish Reason",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 26 },
          "id": 102,
          "title": "Cache & Resources",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "max": 1,
              "min": 0,
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 27 },
          "id": 10,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "kserve_vllm:kv_cache_usage_perc{model_name=~\"$model_name\"}",
              "legendFormat": "KV Cache Usage"
            },
            {
              "expr": "kserve_inference_pool_average_kv_cache_utilization{name=~\".*\"}",
              "legendFormat": "Pool Avg KV Cache"
            }
          ],
          "title": "KV Cache Utilization",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 27 },
          "id": 11,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "kserve_inference_pool_ready_pods",
              "legendFormat": "Ready Pods"
            },
            {
              "expr": "kserve_inference_pool_average_queue_size",
              "legendFormat": "Avg Queue Size"
            }
          ],
          "title": "Inference Pool",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 27 },
          "id": 12,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum by(le) (increase(kserve_vllm:request_prompt_tokens_bucket{model_name=~\"$model_name\"}[5m]))",
              "legendFormat": "Prompt: {{le}}",
              "format": "heatmap"
            }
          ],
          "title": "Request Prompt Length Distribution",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 35 },
          "id": 103,
          "title": "Prefix Cache",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "max": 1,
              "min": 0,
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 36 },
          "id": 13,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "rate(kserve_vllm:prefix_cache_hits_total{model_name=~\"$model_name\"}[$__rate_interval]) / rate(kserve_vllm:prefix_cache_queries_total{model_name=~\"$model_name\"}[$__rate_interval])",
              "legendFormat": "Hit Rate"
            }
          ],
          "title": "Prefix Cache Hit Rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 36 },
          "id": 14,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "kserve_vllm:num_preemptions_total{model_name=~\"$model_name\"}",
              "legendFormat": "Preemptions"
            }
          ],
          "title": "Preemptions",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": ["llm-d", "kserve", "vllm", "maas"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": {},
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(kserve_vllm:num_requests_running, model_name)",
            "hide": 0,
            "includeAll": true,
            "label": "Model",
            "multi": false,
            "name": "model_name",
            "query": { "qryType": 1, "query": "label_values(kserve_vllm:num_requests_running, model_name)" },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "LLM-d / LLMInferenceService Metrics",
      "uid": "llm-d-vllm-metrics"
    }

apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: llm-d-dashboard
  namespace: user-grafana
  labels:
    app: grafana
spec:
  folder: "RHOAI MaaS Dashboard"
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Latency",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "pointSize": 5, "showPoints": "auto", "spanNulls": true },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 1 },
          "id": 1,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "histogram_quantile(0.99, sum by(le) (increase(kserve_vllm:time_to_first_token_seconds_bucket{model_name=~\"$model_name\"}[$__range])))", "legendFormat": "p99", "instant": true },
            { "expr": "histogram_quantile(0.95, sum by(le) (increase(kserve_vllm:time_to_first_token_seconds_bucket{model_name=~\"$model_name\"}[$__range])))", "legendFormat": "p95", "instant": true },
            { "expr": "histogram_quantile(0.50, sum by(le) (increase(kserve_vllm:time_to_first_token_seconds_bucket{model_name=~\"$model_name\"}[$__range])))", "legendFormat": "p50", "instant": true },
            { "expr": "kserve_vllm:time_to_first_token_seconds_sum{model_name=~\"$model_name\"} / kserve_vllm:time_to_first_token_seconds_count{model_name=~\"$model_name\"}", "legendFormat": "avg (all time)", "instant": true }
          ],
          "title": "Time to First Token (TTFT)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "pointSize": 5, "showPoints": "auto", "spanNulls": true },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 1 },
          "id": 2,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "histogram_quantile(0.99, sum by(le) (increase(kserve_vllm:request_time_per_output_token_seconds_bucket{model_name=~\"$model_name\"}[$__range])))", "legendFormat": "p99", "instant": true },
            { "expr": "histogram_quantile(0.95, sum by(le) (increase(kserve_vllm:request_time_per_output_token_seconds_bucket{model_name=~\"$model_name\"}[$__range])))", "legendFormat": "p95", "instant": true },
            { "expr": "histogram_quantile(0.50, sum by(le) (increase(kserve_vllm:request_time_per_output_token_seconds_bucket{model_name=~\"$model_name\"}[$__range])))", "legendFormat": "p50", "instant": true },
            { "expr": "kserve_vllm:request_time_per_output_token_seconds_sum{model_name=~\"$model_name\"} / kserve_vllm:request_time_per_output_token_seconds_count{model_name=~\"$model_name\"}", "legendFormat": "avg (all time)", "instant": true }
          ],
          "title": "Time Per Output Token (TPOT)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "pointSize": 5, "showPoints": "auto", "spanNulls": true },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 1 },
          "id": 3,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "histogram_quantile(0.99, sum by(le) (increase(kserve_vllm:e2e_request_latency_seconds_bucket{model_name=~\"$model_name\"}[$__range])))", "legendFormat": "p99", "instant": true },
            { "expr": "histogram_quantile(0.95, sum by(le) (increase(kserve_vllm:e2e_request_latency_seconds_bucket{model_name=~\"$model_name\"}[$__range])))", "legendFormat": "p95", "instant": true },
            { "expr": "histogram_quantile(0.50, sum by(le) (increase(kserve_vllm:e2e_request_latency_seconds_bucket{model_name=~\"$model_name\"}[$__range])))", "legendFormat": "p50", "instant": true },
            { "expr": "kserve_vllm:e2e_request_latency_seconds_sum{model_name=~\"$model_name\"} / kserve_vllm:e2e_request_latency_seconds_count{model_name=~\"$model_name\"}", "legendFormat": "avg (all time)", "instant": true }
          ],
          "title": "E2E Request Latency",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "pointSize": 5, "showPoints": "auto", "spanNulls": true },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 9 },
          "id": 4,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "histogram_quantile(0.99, sum by(le) (increase(kserve_vllm:inter_token_latency_seconds_bucket{model_name=~\"$model_name\"}[$__range])))", "legendFormat": "p99", "instant": true },
            { "expr": "histogram_quantile(0.95, sum by(le) (increase(kserve_vllm:inter_token_latency_seconds_bucket{model_name=~\"$model_name\"}[$__range])))", "legendFormat": "p95", "instant": true },
            { "expr": "histogram_quantile(0.50, sum by(le) (increase(kserve_vllm:inter_token_latency_seconds_bucket{model_name=~\"$model_name\"}[$__range])))", "legendFormat": "p50", "instant": true }
          ],
          "title": "Inter-Token Latency (ITL)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "pointSize": 5, "showPoints": "auto", "spanNulls": true },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 9 },
          "id": 5,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "kserve_vllm:request_prefill_time_seconds_sum{model_name=~\"$model_name\"} / kserve_vllm:request_prefill_time_seconds_count{model_name=~\"$model_name\"}", "legendFormat": "Prefill avg" },
            { "expr": "kserve_vllm:request_decode_time_seconds_sum{model_name=~\"$model_name\"} / kserve_vllm:request_decode_time_seconds_count{model_name=~\"$model_name\"}", "legendFormat": "Decode avg" },
            { "expr": "kserve_vllm:request_queue_time_seconds_sum{model_name=~\"$model_name\"} / kserve_vllm:request_queue_time_seconds_count{model_name=~\"$model_name\"}", "legendFormat": "Queue avg" }
          ],
          "title": "Prefill / Decode / Queue Time (avg)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "pointSize": 5, "showPoints": "auto", "spanNulls": true },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 9 },
          "id": 6,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "histogram_quantile(0.95, sum by(le) (increase(kserve_vllm:time_to_first_token_seconds_bucket{model_name=~\"$model_name\"}[5m])))", "legendFormat": "TTFT p95" },
            { "expr": "histogram_quantile(0.95, sum by(le) (increase(kserve_vllm:e2e_request_latency_seconds_bucket{model_name=~\"$model_name\"}[5m])))", "legendFormat": "E2E p95" },
            { "expr": "histogram_quantile(0.95, sum by(le) (increase(kserve_vllm:request_time_per_output_token_seconds_bucket{model_name=~\"$model_name\"}[5m])))", "legendFormat": "TPOT p95" }
          ],
          "title": "Latency Trend (p95, 5m window)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 17 },
          "id": 101,
          "title": "Throughput & Requests",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never", "spanNulls": true },
              "unit": "cps"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 18 },
          "id": 7,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "rate(kserve_vllm:generation_tokens_total{model_name=~\"$model_name\"}[5m])", "legendFormat": "Generation tok/s" },
            { "expr": "rate(kserve_vllm:prompt_tokens_total{model_name=~\"$model_name\"}[5m])", "legendFormat": "Prompt tok/s" }
          ],
          "title": "Token Throughput",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never", "spanNulls": true },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 18 },
          "id": 8,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "kserve_vllm:num_requests_running{model_name=~\"$model_name\"}", "legendFormat": "Running" },
            { "expr": "kserve_vllm:num_requests_waiting{model_name=~\"$model_name\"}", "legendFormat": "Waiting" }
          ],
          "title": "Scheduler State",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never", "spanNulls": true },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 18 },
          "id": 9,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "sum by(finished_reason) (rate(kserve_vllm:request_success_total{model_name=~\"$model_name\"}[5m]))", "legendFormat": "{{finished_reason}}" }
          ],
          "title": "Request Rate by Finish Reason",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 26 },
          "id": 102,
          "title": "Consumption (Aggregate)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            }
          },
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 27 },
          "id": 20,
          "options": { "colorMode": "value", "graphMode": "none", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            { "expr": "kserve_vllm:prompt_tokens_total{model_name=~\"$model_name\"}", "legendFormat": "Prompt Tokens", "instant": true }
          ],
          "title": "Total Prompt Tokens",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
            }
          },
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 27 },
          "id": 21,
          "options": { "colorMode": "value", "graphMode": "none", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            { "expr": "kserve_vllm:generation_tokens_total{model_name=~\"$model_name\"}", "legendFormat": "Generation Tokens", "instant": true }
          ],
          "title": "Total Generation Tokens",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "orange", "value": null }] }
            }
          },
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 27 },
          "id": 22,
          "options": { "colorMode": "value", "graphMode": "none", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            { "expr": "sum(kserve_vllm:request_success_total{model_name=~\"$model_name\"})", "legendFormat": "Total Requests", "instant": true }
          ],
          "title": "Total Requests",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "purple", "value": null }] }
            }
          },
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 27 },
          "id": 23,
          "options": { "colorMode": "value", "graphMode": "none", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            { "expr": "kserve_vllm:e2e_request_latency_seconds_count{model_name=~\"$model_name\"}", "legendFormat": "Completed", "instant": true }
          ],
          "title": "Completed Requests",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2, "showPoints": "never", "spanNulls": true, "stacking": { "mode": "normal" } },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "id": 24,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "increase(kserve_vllm:prompt_tokens_total{model_name=~\"$model_name\"}[5m])", "legendFormat": "Prompt Tokens" },
            { "expr": "increase(kserve_vllm:generation_tokens_total{model_name=~\"$model_name\"}[5m])", "legendFormat": "Generation Tokens" }
          ],
          "title": "Token Consumption (5m windows)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "bars", "fillOpacity": 80, "lineWidth": 1, "showPoints": "never", "stacking": { "mode": "normal" } },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "id": 25,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "sum by(handler, status) (increase(kserve_http_requests_total{llm_isvc_name=~\"$model_name\"}[5m]))", "legendFormat": "{{handler}} ({{status}})" }
          ],
          "title": "HTTP Requests by Endpoint (5m windows)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 40 },
          "id": 103,
          "title": "Cache & Infrastructure",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2, "showPoints": "never", "spanNulls": true },
              "max": 1, "min": 0, "unit": "percentunit"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 41 },
          "id": 10,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "kserve_vllm:kv_cache_usage_perc{model_name=~\"$model_name\"}", "legendFormat": "KV Cache Usage" },
            { "expr": "kserve_inference_pool_average_kv_cache_utilization", "legendFormat": "Pool Avg KV Cache" }
          ],
          "title": "KV Cache Utilization",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never", "spanNulls": true },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 41 },
          "id": 11,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "kserve_inference_pool_ready_pods", "legendFormat": "Ready Pods" },
            { "expr": "kserve_inference_pool_average_queue_size", "legendFormat": "Avg Queue Size" }
          ],
          "title": "Inference Pool",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never", "spanNulls": true },
              "max": 1, "min": 0, "unit": "percentunit"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 41 },
          "id": 13,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "rate(kserve_vllm:prefix_cache_hits_total{model_name=~\"$model_name\"}[5m]) / rate(kserve_vllm:prefix_cache_queries_total{model_name=~\"$model_name\"}[5m])", "legendFormat": "Hit Rate" }
          ],
          "title": "Prefix Cache Hit Rate",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 49 },
          "id": 104,
          "title": "Per-User / Per-Tier Consumption",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 50 },
          "id": 30,
          "options": {
            "mode": "markdown",
            "content": "**Note:** Per-user and per-tier token consumption metrics are not available in RHOAI 3.3.\n\nThe Kuadrant AuthPolicy managed by the ModelsAsService operator has `metrics: false` on all rules, so Authorino does not emit per-request metrics with user/tier labels.\n\nTo track per-user consumption, consider:\n- Enabling Envoy access logging with userid/tier from Authorino response headers\n- Querying the `maas-api` usage API (if available in future versions)\n- Using a custom sidecar proxy that logs token counts per user"
          },
          "title": "Limitation",
          "type": "text"
        }
      ],
      "schemaVersion": 39,
      "tags": ["llm-d", "kserve", "vllm", "maas", "rhoai"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": {},
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(kserve_vllm:num_requests_running, model_name)",
            "hide": 0,
            "includeAll": true,
            "label": "Model",
            "multi": false,
            "name": "model_name",
            "query": { "qryType": 1, "query": "label_values(kserve_vllm:num_requests_running, model_name)" },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "",
      "title": "LLM-d / LLMInferenceService Metrics",
      "uid": "llm-d-vllm-metrics"
    }

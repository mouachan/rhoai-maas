apiVersion: kuadrant.io/v1alpha1
kind: TokenRateLimitPolicy
metadata:
  name: maas-tier-token-limits
  namespace: openshift-ingress
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: maas-default-gateway
  defaults:
    strategy: merge
    limits:
      free-tier-tokens:
        rates:
          - limit: 10000
            window: 24h
        when:
          - predicate: auth.metadata.matchedTier.tier == "free"
        counters:
          - expression: auth.identity.userid
      premium-tier-tokens:
        rates:
          - limit: 100000
            window: 24h
        when:
          - predicate: auth.metadata.matchedTier.tier == "premium"
        counters:
          - expression: auth.identity.userid
      enterprise-tier-tokens:
        rates:
          - limit: 1000000
            window: 24h
        when:
          - predicate: auth.metadata.matchedTier.tier == "enterprise"
        counters:
          - expression: auth.identity.userid

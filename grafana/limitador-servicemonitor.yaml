apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: limitador-metrics
  namespace: kuadrant-system
  labels:
    app: limitador
    app.kubernetes.io/part-of: maas-observability
spec:
  selector:
    matchLabels:
      app: limitador
  endpoints:
  - port: http
    path: /metrics
    interval: 30s

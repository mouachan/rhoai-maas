worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Run as non-root — temp paths in /tmp
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;

        # API calls -> proxy to backend
        location /api/ {
            proxy_pass http://maas-portal-api:7860;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Access-Token $http_x_forwarded_access_token;
            proxy_set_header X-Forwarded-User $http_x_forwarded_user;
            proxy_set_header X-Forwarded-Groups $http_x_forwarded_groups;
            proxy_set_header X-MaaS-Token $http_x_maas_token;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 180s;
        }

        # SPA fallback — serve index.html for all non-file routes
        location / {
            try_files $uri $uri/ /index.html;
            # Prevent browser from caching index.html so new deploys are picked up immediately
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
